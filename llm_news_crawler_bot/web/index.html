<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM News Crawler</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <form id="crawlForm" class="panel">
          <div class="brand">
            <div>
              <p class="eyebrow">LLM News Crawler</p>
              <h1>Cao du lieu tin tuc</h1>
            </div>
            <span id="statusBadge" class="badge">Ready</span>
          </div>

          <label>
            <span>URL bai viet</span>
            <input id="url" name="url" type="url" placeholder="https://..." required />
          </label>

          <div class="grid">
            <label>
              <span>Tai khoan</span>
              <input id="username" name="username" autocomplete="username" />
            </label>
            <label>
              <span>Mat khau</span>
              <input id="password" name="password" type="password" autocomplete="current-password" />
            </label>
          </div>

          <label>
            <span>Cau lenh chi tiet</span>
            <textarea
              id="instruction"
              name="instruction"
              rows="6"
              placeholder="VD: Neu la trang tim kiem, lay ket qua dau tien. Trich xuat tieu de, tac gia, ngay dang, noi dung chinh va bo qua quang cao."
            ></textarea>
          </label>

          <div class="actions">
            <button id="submitBtn" type="submit">
              <span class="spinner" aria-hidden="true"></span>
              <span id="submitText">Bat dau crawl</span>
            </button>
            <button id="stopBtn" class="dangerBtn" type="button" disabled>Dung</button>
          </div>
        </form>

        <section class="result panel">
          <div class="resultHead">
            <div>
              <p class="eyebrow">Ket qua</p>
              <h2 id="articleTitle">Chua co du lieu</h2>
            </div>
            <a id="jobLink" href="#" hidden>Mo thu muc output</a>
          </div>

          <section class="logPanel">
            <div class="logHead">
              <h3>Log monitor</h3>
              <span id="logCount">0 lines</span>
            </div>
            <pre id="logs">Waiting for job...</pre>
          </section>

          <div id="emptyState" class="empty" hidden></div>

          <div id="resultBody" hidden>
            <div id="itemsBar" class="itemsBar"></div>
            <div id="fileLinks" class="fileLinks"></div>
            <img id="screenshot" class="screenshot" alt="Anh chup trang tin" />

            <dl class="meta">
              <div><dt>Job</dt><dd id="jobId"></dd></div>
              <div><dt>Nguon</dt><dd id="sourceUrl"></dd></div>
              <div><dt>Ngay dang</dt><dd id="publishedAt"></dd></div>
              <div><dt>Tac gia</dt><dd id="author"></dd></div>
              <div><dt>Chuyen muc</dt><dd id="category"></dd></div>
              <div><dt>Tags</dt><dd id="tags"></dd></div>
            </dl>

            <section class="summary">
              <h3>Tom tat</h3>
              <p id="summary"></p>
            </section>

            <section class="article">
              <h3>Noi dung</h3>
              <pre id="content"></pre>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script src="/assets/app.js"></script>
  </body>
</html>
